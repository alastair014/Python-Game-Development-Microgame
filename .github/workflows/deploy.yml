name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pygbag

      - run: pygbag --build .
        working-directory: DeploymentExample

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: DeploymentExample/build/web